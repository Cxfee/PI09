<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomEasy | Componente de Erro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: "#f4f7ff",
                            100: "#e7eeff",
                            200: "#cfdcff",
                            300: "#a9c1ff",
                            400: "#789bff",
                            500: "#4f73ff",
                            600: "#3557eb",
                            700: "#1e3aa8",
                            800: "#162a78"
                        }
                    },
                    boxShadow: {
                        soft: "0 12px 26px rgba(15, 23, 42, 0.10)"
                    }
                }
            }
        };
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                font-family: "Plus Jakarta Sans", sans-serif;
            }
        }
    </style>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_top,_#edf4ff_0,_#f7faff_35%,_#eff5ff_100%)] px-4 py-10 text-slate-900">
    <main class="mx-auto flex min-h-[calc(100vh-5rem)] max-w-3xl items-center justify-center">
        <section class="w-full max-w-md rounded-[28px] border border-white/80 bg-white p-6 shadow-soft sm:p-8">
            <p class="text-xs font-extrabold uppercase tracking-[0.16em] text-rose-600">
                Pr&eacute;via do componente
            </p>
            <h1 class="mt-3 text-3xl font-extrabold tracking-tight text-slate-950">
                Alerta de erro
            </h1>
            <p class="mt-2 text-sm leading-6 text-slate-500">
                Vers&atilde;o isolada do feedback visual usado no painel do estudante.
            </p>

            <div class="mt-8 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-4 shadow-soft">
                <div class="flex items-start gap-3">
                    <span class="mt-0.5 inline-flex h-8 w-8 items-center justify-center rounded-full bg-rose-600/10 text-rose-700">
                        <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="m15 9-6 6"></path>
                            <path d="m9 9 6 6"></path>
                        </svg>
                    </span>
                    <div>
                        <p class="text-xs font-extrabold uppercase tracking-wide text-slate-900">
                            Erro: hor&aacute;rio indispon&iacute;vel
                        </p>
                        <p class="mt-1 text-sm leading-6 text-slate-600">
                            Escolha outro hor&aacute;rio ou tente uma sala diferente para concluir a reserva.
                        </p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
