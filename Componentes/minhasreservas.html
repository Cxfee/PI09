<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomEasy | Componente Minhas Reservas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: "#f4f7ff",
                            100: "#e7eeff",
                            200: "#cfdcff",
                            300: "#a9c1ff",
                            400: "#789bff",
                            500: "#4f73ff",
                            600: "#3557eb",
                            700: "#1e3aa8",
                            800: "#162a78"
                        }
                    },
                    boxShadow: {
                        soft: "0 12px 26px rgba(15, 23, 42, 0.10)"
                    }
                }
            }
        };
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                font-family: "Plus Jakarta Sans", sans-serif;
            }
        }
    </style>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_top,_#edf4ff_0,_#f7faff_35%,_#eff5ff_100%)] px-4 py-10 text-slate-900">
    <main class="mx-auto max-w-5xl">
        <section class="rounded-[28px] border border-white/80 bg-white p-5 shadow-soft sm:p-6">
            <div class="mb-5">
                <p class="text-xs font-extrabold uppercase tracking-[0.16em] text-brand-600">
                    Pr&eacute;via do componente
                </p>
                <h1 class="mt-3 text-3xl font-extrabold tracking-tight text-slate-950">
                    Minhas Reservas
                </h1>
                <p class="mt-2 text-sm leading-6 text-slate-500">
                    Estrutura isolada da tabela lateral usada no painel do estudante.
                </p>
            </div>

            <div class="overflow-hidden rounded-[20px] border border-slate-200">
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-slate-200 text-left">
                        <thead class="bg-slate-50">
                            <tr class="text-[0.7rem] font-extrabold uppercase tracking-[0.12em] text-slate-600">
                                <th class="px-3 py-3">Sala</th>
                                <th class="px-3 py-3">Data</th>
                                <th class="px-3 py-3">Hor&aacute;rio</th>
                                <th class="px-3 py-3">A&ccedil;&atilde;o</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-100 bg-white text-sm text-slate-700">
                            <tr>
                                <td class="px-3 py-4 font-semibold">Sala de Estudos 3A</td>
                                <td class="px-3 py-4">13 abr</td>
                                <td class="px-3 py-4">22:00</td>
                                <td class="px-3 py-4">
                                    <button class="whitespace-nowrap rounded-lg border border-slate-300 px-2.5 py-1.5 text-[0.68rem] font-extrabold uppercase tracking-wide text-slate-700 transition hover:border-rose-300 hover:text-rose-600">
                                        Cancelar Reserva
                                    </button>
                                </td>
                            </tr>
                            <tr>
                                <td class="px-3 py-4 font-semibold">Laborat&oacute;rio de Biologia 2</td>
                                <td class="px-3 py-4">15 abr</td>
                                <td class="px-3 py-4">14:00</td>
                                <td class="px-3 py-4">
                                    <button class="whitespace-nowrap rounded-lg border border-slate-300 px-2.5 py-1.5 text-[0.68rem] font-extrabold uppercase tracking-wide text-slate-700 transition hover:border-rose-300 hover:text-rose-600">
                                        Cancelar Reserva
                                    </button>
                                </td>
                            </tr>
                            <tr>
                                <td class="px-3 py-4 font-semibold">Sala de Reuni&atilde;o 1C</td>
                                <td class="px-3 py-4">18 abr</td>
                                <td class="px-3 py-4">10:00</td>
                                <td class="px-3 py-4">
                                    <button class="whitespace-nowrap rounded-lg border border-slate-300 px-2.5 py-1.5 text-[0.68rem] font-extrabold uppercase tracking-wide text-slate-700 transition hover:border-rose-300 hover:text-rose-600">
                                        Cancelar Reserva
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
