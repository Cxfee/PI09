<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>RoomEasy | Admin</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: "#f4f7ff",
                            100: "#e7eeff",
                            200: "#cfdcff",
                            300: "#a9c1ff",
                            400: "#789bff",
                            500: "#4f73ff",
                            600: "#3557eb",
                            700: "#1e3aa8",
                            800: "#162a78"
                        }
                    },
                    boxShadow: {
                        panel: "0 30px 80px rgba(30, 58, 168, 0.14)",
                        field: "0 10px 30px rgba(15, 23, 42, 0.08)"
                    }
                }
            }
        };
        </script>
        <style type="text/tailwindcss">
            @layer base {
                body {
                    font-family: "Plus Jakarta Sans", sans-serif;
                }
            }
        </style>
    </head>
    <body class="min-h-screen bg-slate-100 text-slate-900">
        <main class="mx-auto max-w-7xl px-4 py-6">
            <header class="flex flex-wrap items-center justify-between gap-4 rounded-3xl bg-white p-5 shadow-panel">
                <div>
                    <h1 class="text-2xl font-extrabold text-brand-700">RoomEasy | Painel Administrativo</h1>
                    <p id="adminName" class="text-slate-500"></p>
                </div>
                <button onclick="logout()" class="inline-flex h-11 items-center gap-2 rounded-2xl border border-slate-200 bg-white px-3 text-sm font-semibold text-slate-600 transition hover:border-rose-200 hover:text-rose-600">
                     <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <path d="m16 17 5-5-5-5"></path>
                            <path d="M21 12H9"></path>
                    </svg>
                    <span class="hidden sm:inline">Sair</span>
                </button>
            </header>
            <section class="mt-6 grid gap-4 md:grid-cols-4">
                <div class="card">
                    <p>Salas</p>
                    <b id="countRooms">0</b>
                </div><div class="card">
                    <p>Usuários</p>
                    <b id="countUsers">0</b>
                </div>
                <div class="card">
                    <p>Reservas</p>
                    <b id="countReservas">0</b>
                </div>
                <div class="card">
                    <p>Solicitações</p>
                    <b id="countSolic">0</b>
                </div>
            </section>
            <section class="mt-6 grid gap-6 lg:grid-cols-[1.3fr_.7fr]">
                <div class="space-y-6">
                    <div class="box">
                        <h2>Salas monitoradas</h2>
                        <div id="roomsTable"></div>
                    </div>
                    <div class="box">
                        <h2>Usuários recentes</h2>
                        <div id="usersList" class="grid gap-3 md:grid-cols-2"></div>
                    </div>
                    <div class="box">
                        <h2>Solicitações do professor</h2>
                        <div id="solicitacoesList" class="space-y-3"></div>
                    </div>
                </div>
                <aside class="space-y-6">
                    <div class="box">
                        <h2>Cadastrar nova sala</h2>
                        <form id="roomForm" class="mt-4 grid gap-3">
                            <input id="nome" placeholder="Nome da sala" class="input">
                            <select id="tipo" class="input">
                                <option>Sala de Estudo</option>
                                <option>Laboratorio</option>
                            </select>
                            <input id="capacidade" type="number" min="1" value="4" class="input">
                            <div class="grid grid-cols-2 gap-3">
                                <input id="hora_inicio" type="time" value="08:00" class="input">
                                <input id="hora_fim" type="time" value="18:00" class="input">
                            </div>
                            <select id="status_sala" class="input">
                                <option value="ativa">Ativa</option>
                                <option value="revisao">Em revisão</option>
                                <option value="bloqueada">Bloqueada</option>
                            </select>
                            <select id="ilustracao" class="input">
                                <option value="study">Sala de estudo compacta</option>
                                <option value="study-wide">Sala ampla</option>
                                <option value="bio">Laboratório de biologia</option>
                                <option value="informatics">Laboratório de informática</option>
                                <option value="maker">Laboratório maker</option>
                                <option value="meeting">Sala de reunião</option>
                            </select>
                            <button class="btn">Salvar sala</button>
                        </form>
                        <div id="feedback" class="mt-3 hidden rounded-xl border px-4 py-3 text-sm font-semibold"></div>
                    </div>
                    <div class="box">
                        <h2>Reservas dos alunos</h2>
                        <div id="reservasList" class="space-y-3"></div>
                    </div>
                </aside>
            </section>
        </main>
        <style>.box{
            border-radius:24px;
            background:white;
            padding:20px;
            box-shadow:0 10px 30px rgba(15,23,42,.08)}.box h2
            {
                font-size:1.35rem;
                font-weight:800}.input
                {
                    width:100%;
                    border:1px solid #e2e8f0;
                    border-radius:16px;
                    padding:12px;
                    background:#f8fafc;
                    outline:none}.btn
                {
                    border-radius:16px;
                    background:#3557eb;color:white;
                    padding:12px;
                    font-weight:800}.badge
                {
                    border-radius:999px;
                    padding:4px 10px;
                    font-size:.7rem;
                    font-weight:800;
                    text-transform:uppercase
        }
        </style>



<script>
    const $=id=>document.getElementById(id);
    const api='../api/';
    let salas=[],usuarios=[],reservas=[],solicitacoes=[];
    function user(){
        return JSON.parse(localStorage.getItem('roomEasyCurrentUser')||'null')
    }
    function logout(){
        localStorage.removeItem('roomEasyCurrentUser');
        location.href='../index.html'
    }
    function fb(t,m){
        const e=$('feedback');
        e.className=`mt-3 rounded-xl border px-4 py-3 text-sm font-semibold 
            ${t?'border-emerald-200 bg-emerald-50 text-emerald-700':'border-rose-200 bg-rose-50 text-rose-700'}`;
        e.textContent=m;
        e.classList.remove('hidden')
    }
    async function getJson(url){
        const r=await fetch(url);
        return r.json()
    }
    async function post(url,data){
        const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
        return r.json()
    }
    function badgeStatus(s){
        return `<span class="badge ${s==='ativa'?'bg-emerald-100 text-emerald-700':s==='bloqueada'?'bg-rose-100 text-rose-700':'bg-amber-100 text-amber-700'}">${s}</span>`
    }
    async function carregar(){
        const u=user();
        if(!u){location.href='../index.html';
            return
        }
        if(u.role!=='admin'){alert('Acesso permitido apenas para administrador.');
            location.href='../index.html';
            return
        }
        $('adminName').textContent=u.name||u.email;[salas,usuarios,reservas,solicitacoes]=await Promise.all([getJson(api+'listar_salas.php').then(j=>j.salas||[]),
            getJson(api+'listar_usuarios.php').then(j=>j.usuarios||[]),
            getJson(api+'listar_reservas.php').then(j=>j.reservas||[]),
            getJson(api+'listar_solicitacoes_professor.php').then(j=>j.solicitacoes||[])]);
        render()
    }
    function render(){$('countRooms').textContent=salas.length;
    $('countUsers').textContent=usuarios.length;
    $('countReservas').textContent=reservas.length;
    $('countSolic').textContent=solicitacoes.length;
    $('roomsTable').innerHTML=salas.length?`<div class="overflow-x-auto">
        <table class="w-full text-left text-sm">
            <thead>
                <tr class="text-slate-500">
                    <th>Sala</th>
                    <th>Tipo</th>
                    <th>Horário</th>
                    <th>Cap.</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                ${salas.map(s=>`<tr class="border-t">
                    <td class="py-3 font-bold">${s.nome}</td>
                    <td>${s.tipo}</td>
                    <td>${s.hora_inicio} - ${s.hora_fim}</td>
                    <td>${s.capacidade}</td>
                    <td>${badgeStatus(s.status_sala)}</td>
                    <td>
                        <select onchange="mudarStatus('${s.id}',this.value)" class="rounded-lg border p-1">
                            <option value="ativa" ${s.status_sala==='ativa'?'selected':''}>Ativa</option>
                            <option value="revisao" ${s.status_sala==='revisao'?'selected':''}>Revisão</option>
                            <option value="bloqueada" ${s.status_sala==='bloqueada'?'selected':''}>Bloqueada</option>
                        </select> 
                        <button onclick="removerSala('${s.id}')" class="text-rose-600 font-bold">Remover</button>
                    </td>
                </tr>`).join('')}
            </tbody>
        </table>
    </div>`:'<p class="text-slate-500">Nenhuma sala cadastrada.</p>';
    $('usersList').innerHTML=usuarios.length?usuarios.map(u=>`<article class="rounded-2xl bg-slate-50 p-4">
            <b>${u.nome}</b><p>${u.email}</p>
            <span class="text-xs font-bold uppercase text-brand-700">${u.tipo_acesso}</span>
        </article>`).join(''):'<p class="text-slate-500">Nenhum usuário.</p>';
    $('reservasList').innerHTML=reservas.length?reservas.map(r=>`<article class="rounded-2xl bg-slate-50 p-4">
            <b>${r.sala_nome}</b><p>${r.data_reserva} às ${r.hora_inicio}</p>
            <p class="text-xs">${r.email_usuario}</p>
            <button onclick="cancelar(${r.id})" class="mt-2 text-rose-600 font-bold">Cancelar</button>
        </article>`).join(''):'<p class="text-slate-500">Nenhuma reserva.</p>';
    $('solicitacoesList').innerHTML=solicitacoes.length?solicitacoes.map(s=>`<article class="rounded-2xl bg-slate-50 p-4">
            <b>${s.professor_nome} - ${s.sala_nome}</b><p>${s.turma_atividade} | ${s.data_solicitacao} | ${s.hora_inicio}-${s.hora_fim}</p>
            <p>${s.finalidade}</p>
            <select onchange="mudarSolic(${s.id},this.value)" class="mt-2 rounded-lg border p-2">
                <option value="confirmada" ${s.status_solicitacao==='confirmada'?'selected':''}>Confirmada</option>
                <option value="em-analise" ${s.status_solicitacao==='em-analise'?'selected':''}>Em análise</option>
                <option value="recusada" ${s.status_solicitacao==='recusada'?'selected':''}>Recusada</option>
            </select>
        </article>`).join(''):'<p class="text-slate-500">Nenhuma solicitação.</p>'}
    $('roomForm').addEventListener('submit',async e=>{e.preventDefault();
    const data={nome:$('nome').value,tipo:$('tipo').value,capacidade:$('capacidade').value,hora_inicio:$('hora_inicio').value,hora_fim:$('hora_fim').value,status_sala:$('status_sala').value,ilustracao:$('ilustracao').value};
    const j=await post(api+'cadastrar_sala.php',data);
    fb(j.sucesso,j.mensagem);
    if(j.sucesso){e.target.reset();carregar()}});
    async function mudarStatus(id,status_sala){
        await post(api+'atualizar_status_sala.php',{id,status_sala});
        carregar()
    }
    async function removerSala(id){
        if(confirm('Remover sala?')){await post(api+'remover_sala.php',{id});
        carregar()}
    }
    async function cancelar(id){
        if(confirm('Cancelar reserva?')){await post(api+'cancelar_reserva.php',{id});
        carregar()}
    }
    async function mudarSolic(id,status_solicitacao){
        await post(api+'atualizar_status_solicitacao.php',{id,status_solicitacao});
        carregar()
    }
    carregar();
</script>

</body>

</html>
