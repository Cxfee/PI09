<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomEasy | Professor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: "#f4f7ff",
                            100: "#e7eeff",
                            200: "#cfdcff",
                            300: "#a9c1ff",
                            400: "#789bff",
                            500: "#4f73ff",
                            600: "#3557eb",
                            700: "#1e3aa8",
                            800: "#162a78"
                        }
                    },
                    boxShadow: {
                        panel: "0 30px 80px rgba(30, 58, 168, 0.14)",
                        field: "0 10px 30px rgba(15, 23, 42, 0.08)"
                    }
                }
            }
        };
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                font-family: "Plus Jakarta Sans", sans-serif;
            }
        }
    </style>
</head>
<body class="min-h-screen bg-slate-100 text-slate-900">
    <main class="mx-auto max-w-7xl px-4 py-6">
        <header class="flex flex-wrap items-center justify-between gap-4 rounded-3xl bg-white p-5 shadow-panel">
            <div>
                <h1 class="text-2xl font-extrabold text-brand-700">RoomEasy | Painel do professor</h1>
                <p id="teacherName" class="text-slate-500"></p>
            </div>
            <button onclick="logout()" class="inline-flex h-11 items-center gap-2 rounded-2xl border border-slate-200 bg-white px-3 text-sm font-semibold text-slate-600 transition hover:border-rose-200 hover:text-rose-600">
                <svg class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <path d="m16 17 5-5-5-5"></path>
                        <path d="M21 12H9"></path>
                </svg>
                <span class="hidden sm:inline">Sair</span>
            </button>
        </header>
        <section class="mt-6 grid gap-6 lg:grid-cols-[1.25fr_.75fr]">
            <div class="space-y-6">
                <div class="box">
                    <h2>Agenda / solicitações</h2>
                    <div id="agenda" class="mt-4 space-y-3"></div></div>
                    <div class="box"><h2>Salas ativas</h2>
                        <div id="rooms" class="mt-4 grid gap-3 md:grid-cols-2"></div>
                    </div></div>
                    <aside class="space-y-6">
                        <div class="box"><h2>Solicitar novo espaço</h2>
                            <form id="requestForm" class="mt-4 grid gap-3">
                                <select id="sala_id" class="input"></select>
                                <input id="turma_atividade" placeholder="Turma ou atividade" class="input">
                                <input id="finalidade" placeholder="Finalidade" class="input">
                                <input id="data_solicitacao" type="date" class="input">
                                <div class="grid grid-cols-2 gap-3">
                                    <select id="hora_inicio" class="input"></select>
                                    <select id="hora_fim" class="input"></select>
                                </div>
                                <button class="btn">Enviar solicitação</button>
                            </form>
                                <div id="feedback" class="mt-3 hidden rounded-xl border px-4 py-3 text-sm font-semibold"></div>
                        </div>
                                <div class="box">
                                    <h2>Reservas dos alunos</h2>
                                    <div id="studentReservations" class="mt-4 space-y-3"></div>
                                </div>
                    </aside>
        </section>
    </main>
    <style>.box{
        border-radius:24px;
        background:white;
        padding:20px;
        box-shadow:0 10px 30px rgba(15,23,42,.08)}.box h2
        {
            font-size:1.35rem;
            font-weight:800}.input
            {
                width:100%;
                border:1px solid #e2e8f0;
                border-radius:16px;
                padding:12px;
                background:#f8fafc;
                outline:none}.btn
            {
                border-radius:16px;
                background:#3557eb;color:white;
                padding:12px;
                font-weight:800}.badge
            {
                border-radius:999px;
                padding:4px 10px;
                font-size:.7rem;
                font-weight:800;
                text-transform:uppercase
    }
    </style>


<script>
const $=id=>document.getElementById(id);
const api='../api/';
const times=['07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00','18:00','19:00','20:00','21:00','22:00'];
let current=null,salas=[],solicitacoes=[],reservas=[];
function user(){
    return JSON.parse(localStorage.getItem('roomEasyCurrentUser')||'null')
}
function logout(){
    localStorage.removeItem('roomEasyCurrentUser');
    location.href='../index.html'
}
function today(){
    return new Date().toISOString().slice(0,10)
}
function fb(t,m){
    const e=$('feedback');
    e.className=`mt-3 rounded-xl border px-4 py-3 text-sm font-semibold
         ${t?'border-emerald-200 bg-emerald-50 text-emerald-700':'border-rose-200 bg-rose-50 text-rose-700'}`;
     e.textContent=m;e.classList.remove('hidden')
    }
async function getJson(url){const r=await fetch(url);
    return r.json()
}
async function post(url,data){
    const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    return r.json()
}
function badge(s){
    return `<span class="badge 
    ${s==='confirmada'?'bg-emerald-100 text-emerald-700':s==='recusada'?'bg-rose-100 text-rose-700':'bg-amber-100 text-amber-700'}">
    ${s}</span>`
}
async function carregar()
{
    current=user();
    if(!current)
    {
        location.href='../index.html';
        return
    }
    if(current.role!=='professor')
    {
        alert('Acesso permitido apenas para professor.');
        location.href='../index.html';
        return
    }
    $('teacherName').textContent=current.name||current.email;
    $('data_solicitacao').value=$('data_solicitacao').value||today();
    $('hora_inicio').innerHTML=times.map(t=>`<option value="${t}">${t}</option>`).join('');
    $('hora_fim').innerHTML=times.map(t=>`<option value="${t}" ${t==='10:00'?'selected':''}>${t}</option>`).join('');
    [salas,solicitacoes,reservas]=await Promise.all([getJson(api+'listar_salas.php?ativas=1').then(j=>j.salas||[]),
    getJson(api+'listar_solicitacoes_professor.php?email='+encodeURIComponent(current.email)).then(j=>j.solicitacoes||[]),
    getJson(api+'listar_reservas.php').then(j=>j.reservas||[])]);
    render()
}
function render(){
$('sala_id').innerHTML=salas.length?'<option value="">Selecione uma sala</option>'+salas.map(s=>`<option value="${s.id}">${s.nome} | ${s.hora_inicio}-${s.hora_fim}</option>`).join(''):'<option value="">Nenhuma sala ativa</option>';
$('rooms').innerHTML=salas.length?salas.map(s=>`<article class="rounded-2xl bg-slate-50 p-4"><b>${s.nome}</b><p>${s.tipo} | ${s.capacidade} lugares</p><p>${s.hora_inicio} - ${s.hora_fim}</p></article>`).join(''):'<p class="text-slate-500">Nenhuma sala ativa.</p>';
$('agenda').innerHTML=solicitacoes.length?solicitacoes.map(s=>`<article class="rounded-2xl bg-slate-50 p-4">
    <div class="flex justify-between gap-2"><b>${s.sala_nome}</b>${badge(s.status_solicitacao)}</div>
    <p>${s.turma_atividade} | ${s.data_solicitacao} | ${s.hora_inicio}-${s.hora_fim}</p>
    <p class="text-sm text-slate-500">${s.finalidade}</p>
    </article>`).join(''):'<p class="text-slate-500">Nenhuma solicitação criada.</p>';
$('studentReservations').innerHTML=reservas.length?reservas.slice(0,8).map(r=>`<article class="rounded-2xl bg-slate-50 p-4">
    <b>${r.sala_nome}</b><p>${r.data_reserva} às ${r.hora_inicio}</p>
    <p class="text-xs">${r.email_usuario}</p></article>`).join(''):'<p class="text-slate-500">Nenhuma reserva de aluno.</p>'}
$('requestForm').addEventListener('submit',async e=>{e.preventDefault();
const data={email_professor:current.email,sala_id:$('sala_id').value,turma_atividade:$('turma_atividade').value,finalidade:$('finalidade').value,data_solicitacao:$('data_solicitacao').value,hora_inicio:$('hora_inicio').value,hora_fim:$('hora_fim').value};
const j=await post(api+'criar_solicitacao_professor.php',data);
fb(j.sucesso,j.sucesso?`${j.mensagem} Status: ${j.status_solicitacao}`:j.mensagem);
if(j.sucesso){e.target.reset();
await carregar()}});
carregar();

</script>

</body>
</html>
