<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomEasy | Cadastro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: "#f4f7ff",
                            100: "#e7eeff",
                            200: "#cfdcff",
                            300: "#a9c1ff",
                            400: "#789bff",
                            500: "#4f73ff",
                            600: "#3557eb",
                            700: "#1e3aa8",
                            800: "#162a78"
                        }
                    },
                    boxShadow: {
                        panel: "0 30px 80px rgba(30, 58, 168, 0.14)",
                        field: "0 10px 30px rgba(15, 23, 42, 0.08)"
                    }
                }
            }
        };
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                font-family: "Plus Jakarta Sans", sans-serif;
            }
        }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden bg-slate-100 text-slate-900">
    <main class="min-h-screen lg:h-screen">
        <div class="grid min-h-screen w-full bg-white lg:h-screen lg:grid-cols-[1.18fr_0.82fr]">
            <section class="relative hidden h-full overflow-hidden lg:block">
                <img
                    src="./images/Projeto-JPG.jpeg"
                    alt="Ilustra&ccedil;&atilde;o do sistema RoomEasy em um ambiente acad&ecirc;mico"
                    class="h-full w-full object-cover object-center"
                >
            </section>

            <section class="relative flex min-h-screen items-center justify-center bg-white px-5 py-8 sm:px-8 lg:min-h-0 lg:px-12">
                <div class="w-full max-w-md">
                    <div class="space-y-3 text-center lg:text-left">
                        <h1 class="text-3xl font-extrabold tracking-tight text-brand-700 sm:text-4xl">
                            Criar conta
                        </h1>
                        <p class="text-sm text-slate-600 sm:text-base">
                            Crie seu acesso para reservar espa&ccedil;os acad&ecirc;micos com praticidade.
                        </p>
                    </div>

                    <form id="signupForm" novalidate class="mt-8 space-y-4 sm:mt-10 sm:space-y-5">
                        <label class="block">
                            <span class="sr-only">Digite seu e-mail</span>
                            <div class="flex items-center gap-3 rounded-xl border border-slate-200 bg-white px-4 py-3.5 shadow-field transition duration-200 focus-within:border-brand-400 focus-within:ring-4 focus-within:ring-brand-100 sm:gap-4 sm:px-5 sm:py-4">
                                <svg class="h-6 w-6 shrink-0 text-slate-400 sm:h-7 sm:w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                                    <path d="m4 7 8 6 8-6"></path>
                                </svg>
                                <input
                                    id="signupEmail"
                                    type="email"
                                    name="email"
                                    autocomplete="email"
                                    placeholder="Digite seu e-mail"
                                    class="w-full border-0 bg-transparent text-base text-slate-700 placeholder:text-slate-400 focus:outline-none sm:text-lg"
                                >
                            </div>
                        </label>

                        <label class="block">
                            <span class="sr-only">Digite seu CPF</span>
                            <div class="flex items-center gap-3 rounded-xl border border-slate-200 bg-white px-4 py-3.5 shadow-field transition duration-200 focus-within:border-brand-400 focus-within:ring-4 focus-within:ring-brand-100 sm:gap-4 sm:px-5 sm:py-4">
                                <svg class="h-6 w-6 shrink-0 text-slate-400 sm:h-7 sm:w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                                    <path d="M7 10h10"></path>
                                    <path d="M7 14h6"></path>
                                </svg>
                                <input
                                    id="signupCpf"
                                    type="text"
                                    name="cpf"
                                    inputmode="numeric"
                                    placeholder="Digite seu CPF"
                                    class="w-full border-0 bg-transparent text-base text-slate-700 placeholder:text-slate-400 focus:outline-none sm:text-lg"
                                >
                            </div>
                        </label>

                        <label class="block">
                            <span class="sr-only">Digite seu nome</span>
                            <div class="flex items-center gap-3 rounded-xl border border-slate-200 bg-white px-4 py-3.5 shadow-field transition duration-200 focus-within:border-brand-400 focus-within:ring-4 focus-within:ring-brand-100 sm:gap-4 sm:px-5 sm:py-4">
                                <svg class="h-6 w-6 shrink-0 text-slate-400 sm:h-7 sm:w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <path d="M20 21a8 8 0 0 0-16 0"></path>
                                    <circle cx="12" cy="8" r="4"></circle>
                                </svg>
                                <input
                                    id="signupName"
                                    type="text"
                                    name="nome"
                                    autocomplete="name"
                                    placeholder="Digite seu nome"
                                    class="w-full border-0 bg-transparent text-base text-slate-700 placeholder:text-slate-400 focus:outline-none sm:text-lg"
                                >
                            </div>
                        </label>

                        <label class="block">
                            <span class="mb-2 block text-xs font-extrabold uppercase tracking-[0.16em] text-slate-500">
                                Perfil de acesso
                            </span>
                            <select
                                id="signupRole"
                                name="role"
                                class="w-full rounded-xl border border-slate-200 bg-white px-4 py-3.5 text-base text-slate-700 shadow-field outline-none transition focus:border-brand-400 focus:ring-4 focus:ring-brand-100 sm:px-5 sm:text-lg"
                            >
                                <option value="aluno">Aluno</option>
                                <option value="professor">Professor</option>
                                <option value="admin">Admin</option>
                            </select>
                        </label>

                        <label class="block">
                            <span class="sr-only">Digite sua senha</span>
                            <div class="flex items-center gap-3 rounded-xl border border-slate-200 bg-white px-4 py-3.5 shadow-field transition duration-200 focus-within:border-brand-400 focus-within:ring-4 focus-within:ring-brand-100 sm:gap-4 sm:px-5 sm:py-4">
                                <svg class="h-6 w-6 shrink-0 text-slate-400 sm:h-7 sm:w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <rect x="5" y="11" width="14" height="10" rx="2"></rect>
                                    <path d="M8 11V8a4 4 0 1 1 8 0v3"></path>
                                    <path d="M12 15v2"></path>
                                </svg>
                                <input
                                    id="signupPassword"
                                    type="password"
                                    name="password"
                                    autocomplete="new-password"
                                    placeholder="Digite sua senha"
                                    class="w-full border-0 bg-transparent text-base text-slate-700 placeholder:text-slate-400 focus:outline-none sm:text-lg"
                                >
                                <button
                                    id="togglePassword"
                                    type="button"
                                    class="shrink-0 text-slate-400 transition hover:text-brand-700 focus:outline-none"
                                    aria-label="Mostrar senha"
                                >
                                    <svg class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                        <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                            </div>
                        </label>

                        <div id="signupFeedback" class="hidden rounded-xl border px-4 py-3 text-sm font-semibold"></div>

                        <button
                            type="submit"
                            class="w-full rounded-xl bg-gradient-to-r from-brand-600 to-brand-500 px-6 py-3 text-base font-bold text-white shadow-[0_14px_30px_rgba(53,87,235,0.28)] transition duration-200 hover:-translate-y-0.5 hover:from-brand-700 hover:to-brand-600 sm:py-3.5 sm:text-lg"
                        >
                            Cadastrar
                        </button>

                        <p class="border-t border-slate-200 pt-5 text-center text-sm text-slate-600 sm:pt-6 sm:text-base">
                            J&aacute; possui uma conta?
                            <a href="./index.html" class="font-semibold text-brand-600 transition hover:text-brand-800">
                                Fa&ccedil;a login
                            </a>
                        </p>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <script>
        const ACCOUNTS_STORAGE_KEY = "roomEasyAccounts";
        const LEGACY_REGISTERED_STUDENTS_KEY = "roomEasyRegisteredStudents";
        const FLASH_MESSAGE_KEY = "roomEasyAuthFlashMessage";
        const DEMO_ACCOUNTS = [
            {
                email: "aluno@roomeasy.com",
                cpf: "11111111111",
                name: "Ana Lima",
                password: "123456",
                role: "aluno"
            },
            {
                email: "professor@roomeasy.com",
                cpf: "22222222222",
                name: "Prof. Carlos Souza",
                password: "123456",
                role: "professor"
            },
            {
                email: "admin@roomeasy.com",
                cpf: "33333333333",
                name: "Admin RoomEasy",
                password: "123456",
                role: "admin"
            }
        ];
        const signupForm = document.getElementById("signupForm");
        const signupEmailInput = document.getElementById("signupEmail");
        const signupCpfInput = document.getElementById("signupCpf");
        const signupNameInput = document.getElementById("signupName");
        const signupRoleInput = document.getElementById("signupRole");
        const togglePasswordButton = document.getElementById("togglePassword");
        const passwordInput = document.getElementById("signupPassword");
        const signupFeedback = document.getElementById("signupFeedback");
        const openEyeIcon = `
            <svg class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        `;
        const closedEyeIcon = `
            <svg class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 3 21 21"></path>
                <path d="M10.6 10.7a2 2 0 0 0 2.8 2.8"></path>
                <path d="M9.4 5.1A11 11 0 0 1 12 5c6.5 0 10 7 10 7a17.2 17.2 0 0 1-4 4.9"></path>
                <path d="M6.6 6.7C3.8 8.4 2 12 2 12a16.9 16.9 0 0 0 8.5 5.6"></path>
            </svg>
        `;

        function showSignupFeedback(type, message) {
            if (!signupFeedback) {
                return;
            }

            const tone = type === "success"
                ? "border-emerald-200 bg-emerald-50 text-emerald-700"
                : "border-rose-200 bg-rose-50 text-rose-700";

            signupFeedback.className = `rounded-xl border px-4 py-3 text-sm font-semibold ${tone}`;
            signupFeedback.textContent = message;
            signupFeedback.classList.remove("hidden");
        }

        function hideSignupFeedback() {
            if (signupFeedback) {
                signupFeedback.classList.add("hidden");
            }
        }

        function normalizeCpf(value) {
            return value.replace(/\D/g, "");
        }

        function isValidEmail(value) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
        }

        function loadRegisteredStudents() {
            try {
                const storedAccounts = window.localStorage.getItem(ACCOUNTS_STORAGE_KEY);

                if (storedAccounts) {
                    const parsedAccounts = JSON.parse(storedAccounts);
                    return Array.isArray(parsedAccounts) ? parsedAccounts : [];
                }

                const legacyStudents = window.localStorage.getItem(LEGACY_REGISTERED_STUDENTS_KEY);
                const parsedStudents = legacyStudents ? JSON.parse(legacyStudents) : [];

                if (!Array.isArray(parsedStudents)) {
                    return [];
                }

                return parsedStudents.map((student) => ({
                    ...student,
                    role: student.role || "aluno"
                }));
            } catch (error) {
                return [];
            }
        }

        function saveRegisteredStudents(students) {
            try {
                window.localStorage.setItem(ACCOUNTS_STORAGE_KEY, JSON.stringify(students));
            } catch (error) {
                return false;
            }

            return true;
        }

        function ensureDemoAccounts() {
            const storedStudents = loadRegisteredStudents();
            const mergedStudents = [...storedStudents];

            DEMO_ACCOUNTS.forEach((demoAccount) => {
                const alreadyExists = mergedStudents.some((student) => (
                    student.email === demoAccount.email || student.cpf === demoAccount.cpf
                ));

                if (!alreadyExists) {
                    mergedStudents.push({ ...demoAccount });
                }
            });

            saveRegisteredStudents(mergedStudents);
            return mergedStudents;
        }

        if (togglePasswordButton && passwordInput) {
            togglePasswordButton.addEventListener("click", function () {
                const isHidden = passwordInput.type === "password";
                passwordInput.type = isHidden ? "text" : "password";
                togglePasswordButton.innerHTML = isHidden ? closedEyeIcon : openEyeIcon;
                togglePasswordButton.setAttribute("aria-label", isHidden ? "Ocultar senha" : "Mostrar senha");
            });
        }

        let registeredStudents = ensureDemoAccounts();

        if (signupForm && signupEmailInput && signupCpfInput && signupNameInput && signupRoleInput && passwordInput) {
            signupForm.addEventListener("submit", function (event) {
                event.preventDefault();

                const email = signupEmailInput.value.trim().toLowerCase();
                const cpf = normalizeCpf(signupCpfInput.value);
                const name = signupNameInput.value.trim();
                const role = signupRoleInput.value;
                const password = passwordInput.value.trim();

                if (!email || !cpf || !name || !password) {
                    showSignupFeedback("error", "Preencha todos os campos para criar sua conta.");
                    return;
                }

                if (!isValidEmail(email)) {
                    showSignupFeedback("error", "Digite um e-mail valido para continuar.");
                    return;
                }

                if (cpf.length !== 11) {
                    showSignupFeedback("error", "Digite um CPF com 11 digitos.");
                    return;
                }

                if (name.length < 3) {
                    showSignupFeedback("error", "Digite seu nome completo ou pelo menos 3 caracteres.");
                    return;
                }

                if (password.length < 6) {
                    showSignupFeedback("error", "A senha precisa ter pelo menos 6 caracteres.");
                    return;
                }

                const duplicatedStudent = registeredStudents.find((student) => (
                    student.email === email || student.cpf === cpf
                ));

                if (duplicatedStudent) {
                    showSignupFeedback("error", "Ja existe uma conta cadastrada com esse e-mail ou CPF.");
                    return;
                }

                const nextStudents = [
                    ...registeredStudents,
                    {
                        email,
                        cpf,
                        name,
                        password,
                        role
                    }
                ];

                const saved = saveRegisteredStudents(nextStudents);

                if (!saved) {
                    showSignupFeedback("error", "Nao foi possivel salvar sua conta agora. Tente novamente.");
                    return;
                }

                registeredStudents = nextStudents;

                try {
                    const roleLabel = role === "admin" ? "admin" : role === "professor" ? "professor" : "aluno";
                    window.sessionStorage.setItem(FLASH_MESSAGE_KEY, `Conta de ${roleLabel} criada com sucesso. Faca login para entrar no painel.`);
                } catch (error) {
                    // Keep the signup flow working even if the flash message cannot be saved.
                }

                showSignupFeedback("success", "Conta criada com sucesso. Redirecionando para o login...");

                window.setTimeout(() => {
                    window.location.href = "./index.html";
                }, 1200);
            });
        }

        [signupEmailInput, signupCpfInput, signupNameInput, signupRoleInput, passwordInput].forEach((field) => {
            if (field) {
                field.addEventListener("input", hideSignupFeedback);
            }
        });
    </script>
</body>
</html>
