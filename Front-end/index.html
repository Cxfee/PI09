<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomEasy | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: "#f4f7ff",
                            100: "#e7eeff",
                            200: "#cfdcff",
                            300: "#a9c1ff",
                            400: "#789bff",
                            500: "#4f73ff",
                            600: "#3557eb",
                            700: "#1e3aa8",
                            800: "#162a78"
                        }
                    },
                    boxShadow: {
                        panel: "0 30px 80px rgba(30, 58, 168, 0.14)",
                        field: "0 10px 30px rgba(15, 23, 42, 0.08)"
                    }
                }
            }
        };
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                font-family: "Plus Jakarta Sans", sans-serif;
            }
        }
    </style>
</head>
<body class="min-h-screen bg-[radial-gradient(circle_at_top_left,_#edf4ff,_#f7faff_42%,_#ffffff_100%)] text-slate-900">
    <main class="flex min-h-screen items-center justify-center px-4 py-8 sm:px-6 lg:px-10">
        <div class="grid w-full max-w-7xl overflow-hidden rounded-[32px] border border-white/70 bg-white shadow-panel lg:grid-cols-[1.05fr_0.95fr]">
            <section class="relative isolate flex min-h-[360px] flex-col justify-between overflow-hidden bg-gradient-to-br from-[#f3f7ff] via-[#edf2ff] to-[#dfe7ff] px-6 py-8 sm:px-10 sm:py-10 lg:min-h-[820px] lg:px-12 lg:py-12">
                <div class="absolute -left-20 -top-24 h-72 w-72 rounded-full bg-brand-200/60 blur-3xl"></div>
                <div class="absolute bottom-10 right-0 h-64 w-64 rounded-full bg-brand-100 blur-3xl"></div>
                <div class="absolute inset-y-0 right-0 hidden w-px bg-white/70 lg:block"></div>

                <div class="relative z-10 max-w-sm">
                    <span class="inline-flex items-center rounded-full border border-brand-200/80 bg-white/75 px-4 py-2 text-sm font-semibold text-brand-700 shadow-sm backdrop-blur">
                        RoomEasy
                    </span>
                    <h1 class="mt-8 text-4xl font-extrabold tracking-tight text-brand-700 sm:text-5xl lg:text-6xl">
                        RoomEasy
                    </h1>
                    <p class="mt-4 max-w-xs text-lg leading-8 text-slate-600 sm:text-xl">
                        Sistema de reserva de espacos academicos
                    </p>
                </div>

                <div class="relative z-10 mt-8 flex flex-1 items-end justify-center lg:mt-10">
                    <img
                        src="./images/Projeto-JPG.jpeg"
                        alt="Ilustracao do sistema RoomEasy em um ambiente academico"
                        class="w-full max-w-2xl object-contain drop-shadow-[0_24px_45px_rgba(53,87,235,0.22)]"
                    >
                </div>
            </section>

            <section class="relative flex items-center bg-white px-6 py-10 sm:px-10 lg:px-14 lg:py-16">
                <div class="mx-auto w-full max-w-xl">
                    <div class="space-y-4 text-center lg:text-left">
                        <h2 class="text-4xl font-extrabold tracking-tight text-brand-700 sm:text-5xl">
                            RoomEasy
                        </h2>
                        <p class="text-base text-slate-600 sm:text-lg">
                            Sistema de reserva de espacos academicos
                        </p>
                    </div>

                    <form class="mt-12 space-y-7">
                        <label class="block">
                            <span class="sr-only">Digite seu e-mail ou CPF</span>
                            <div class="flex items-center gap-4 rounded-2xl border border-slate-200 bg-white px-5 py-5 shadow-field transition duration-200 focus-within:border-brand-400 focus-within:ring-4 focus-within:ring-brand-100">
                                <svg class="h-7 w-7 shrink-0 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                                    <path d="m4 7 8 6 8-6"></path>
                                </svg>
                                <input
                                    type="text"
                                    placeholder="Digite seu e-mail ou CPF"
                                    class="w-full border-0 bg-transparent text-lg text-slate-700 placeholder:text-slate-400 focus:outline-none"
                                >
                            </div>
                        </label>

                        <label class="block">
                            <span class="sr-only">Senha</span>
                            <div class="flex items-center gap-4 rounded-2xl border border-slate-200 bg-white px-5 py-5 shadow-field transition duration-200 focus-within:border-brand-400 focus-within:ring-4 focus-within:ring-brand-100">
                                <svg class="h-7 w-7 shrink-0 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <rect x="5" y="11" width="14" height="10" rx="2"></rect>
                                    <path d="M8 11V8a4 4 0 1 1 8 0v3"></path>
                                    <path d="M12 15v2"></path>
                                </svg>
                                <input
                                    id="password"
                                    type="password"
                                    placeholder="Senha"
                                    class="w-full border-0 bg-transparent text-lg text-slate-700 placeholder:text-slate-400 focus:outline-none"
                                >
                                <button
                                    id="togglePassword"
                                    type="button"
                                    class="shrink-0 text-slate-400 transition hover:text-brand-700 focus:outline-none"
                                    aria-label="Mostrar senha"
                                >
                                    <svg class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                        <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                            </div>
                        </label>

                        <div class="text-center lg:text-right">
                            <a href="#" class="text-base font-semibold text-brand-600 transition hover:text-brand-800">
                                Esqueci minha senha
                            </a>
                        </div>

                        <button
                            type="submit"
                            class="w-full rounded-2xl bg-gradient-to-r from-brand-600 to-brand-500 px-6 py-5 text-xl font-bold text-white shadow-[0_18px_40px_rgba(53,87,235,0.35)] transition duration-200 hover:-translate-y-0.5 hover:from-brand-700 hover:to-brand-600"
                        >
                            Entrar
                        </button>

                        <p class="border-t border-slate-200 pt-8 text-center text-lg text-slate-600">
                            Nao tem cadastro?
                            <a href="#" class="font-semibold text-brand-600 transition hover:text-brand-800">
                                Cadastre-se
                            </a>
                        </p>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <script>
        const togglePasswordButton = document.getElementById("togglePassword");
        const passwordInput = document.getElementById("password");
        const openEyeIcon = `
            <svg class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        `;
        const closedEyeIcon = `
            <svg class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 3 21 21"></path>
                <path d="M10.6 10.7a2 2 0 0 0 2.8 2.8"></path>
                <path d="M9.4 5.1A11 11 0 0 1 12 5c6.5 0 10 7 10 7a17.2 17.2 0 0 1-4 4.9"></path>
                <path d="M6.6 6.7C3.8 8.4 2 12 2 12a16.9 16.9 0 0 0 8.5 5.6"></path>
            </svg>
        `;

        if (togglePasswordButton && passwordInput) {
            togglePasswordButton.addEventListener("click", function () {
                const isHidden = passwordInput.type === "password";
                passwordInput.type = isHidden ? "text" : "password";
                togglePasswordButton.innerHTML = isHidden ? closedEyeIcon : openEyeIcon;
                togglePasswordButton.setAttribute("aria-label", isHidden ? "Ocultar senha" : "Mostrar senha");
            });
        }
    </script>
</body>
</html>
