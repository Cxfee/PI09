<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomEasy | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: "#f4f7ff",
                            100: "#e7eeff",
                            200: "#cfdcff",
                            300: "#a9c1ff",
                            400: "#789bff",
                            500: "#4f73ff",
                            600: "#3557eb",
                            700: "#1e3aa8",
                            800: "#162a78"
                        }
                    },
                    boxShadow: {
                        panel: "0 30px 80px rgba(30, 58, 168, 0.14)",
                        field: "0 10px 30px rgba(15, 23, 42, 0.08)"
                    }
                }
            }
        };
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                font-family: "Plus Jakarta Sans", sans-serif;
            }
        }
    </style>
</head>
<body class="min-h-screen overflow-x-hidden bg-slate-100 text-slate-900">
    <main class="min-h-screen lg:h-screen">
        <div class="grid min-h-screen w-full bg-white lg:h-screen lg:grid-cols-[1.18fr_0.82fr]">
            <section class="relative hidden h-full overflow-hidden lg:block">
                <img
                    src="./images/Projeto-JPG.jpeg"
                    alt="Ilustracao do sistema RoomEasy em um ambiente academico"
                    class="h-full w-full object-cover object-center"
                >
            </section>

            <section class="relative flex min-h-screen items-center justify-center overflow-hidden bg-white px-5 py-8 sm:px-8 lg:min-h-0 lg:px-12">
                <div class="w-full max-w-md">
                    <div class="space-y-3 text-center lg:text-left">
                        <h2 class="text-3xl font-extrabold tracking-tight text-brand-700 sm:text-4xl">
                            RoomEasy
                        </h2>
                        <p class="text-sm text-slate-600 sm:text-base">
                            Sistema de reserva de espa&ccedil;os acad&ecirc;micos
                        </p>
                    </div>

                    <form id="loginForm" action="./painel-estudante.html" novalidate class="mt-8 space-y-4 sm:mt-10 sm:space-y-5">
                        <label class="block">
                            <span class="sr-only">Digite seu e-mail ou CPF</span>
                            <div class="flex items-center gap-3 rounded-xl border border-slate-200 bg-white px-4 py-3.5 shadow-field transition duration-200 focus-within:border-brand-400 focus-within:ring-4 focus-within:ring-brand-100 sm:gap-4 sm:px-5 sm:py-4">
                                <svg class="h-6 w-6 shrink-0 text-slate-400 sm:h-7 sm:w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                                    <path d="m4 7 8 6 8-6"></path>
                                </svg>
                                <input
                                    id="loginIdentifier"
                                    type="text"
                                    name="identifier"
                                    autocomplete="username"
                                    placeholder="Digite seu e-mail ou CPF"
                                    class="w-full border-0 bg-transparent text-base text-slate-700 placeholder:text-slate-400 focus:outline-none sm:text-lg"
                                >
                            </div>
                        </label>

                        <label class="block">
                            <span class="sr-only">Senha</span>
                            <div class="flex items-center gap-3 rounded-xl border border-slate-200 bg-white px-4 py-3.5 shadow-field transition duration-200 focus-within:border-brand-400 focus-within:ring-4 focus-within:ring-brand-100 sm:gap-4 sm:px-5 sm:py-4">
                                <svg class="h-6 w-6 shrink-0 text-slate-400 sm:h-7 sm:w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                    <rect x="5" y="11" width="14" height="10" rx="2"></rect>
                                    <path d="M8 11V8a4 4 0 1 1 8 0v3"></path>
                                    <path d="M12 15v2"></path>
                                </svg>
                                <input
                                    id="password"
                                    type="password"
                                    name="password"
                                    autocomplete="current-password"
                                    placeholder="Senha"
                                    class="w-full border-0 bg-transparent text-base text-slate-700 placeholder:text-slate-400 focus:outline-none sm:text-lg"
                                >
                                <button
                                    id="togglePassword"
                                    type="button"
                                    class="shrink-0 text-slate-400 transition hover:text-brand-700 focus:outline-none"
                                    aria-label="Mostrar senha"
                                >
                                    <svg class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                                        <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                            </div>
                        </label>

                        <div class="text-center lg:text-right">
                            <a href="#" class="text-sm font-semibold text-brand-600 transition hover:text-brand-800 sm:text-base">
                                Esqueci minha senha
                            </a>
                        </div>

                        <div id="loginFeedback" class="hidden rounded-xl border px-4 py-3 text-sm font-semibold"></div>

                        <div class="rounded-2xl border border-slate-200 bg-slate-50 px-4 py-4">
                            <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
                                <div>
                                    <p class="text-[0.7rem] font-extrabold uppercase tracking-[0.16em] text-brand-600">
                                        Acesso por conta cadastrada
                                    </p>
                                    <p class="mt-1 text-sm text-slate-500">
                                        Use um e-mail ou CPF ja cadastrados. Se este navegador ainda nao tem usuarios, crie o primeiro acesso em Cadastre-se.
                                    </p>
                                </div>
                            </div>
                        </div>

                        <button
                            type="submit"
                            class="w-full rounded-xl bg-gradient-to-r from-brand-600 to-brand-500 px-6 py-3 text-base font-bold text-white shadow-[0_14px_30px_rgba(53,87,235,0.28)] transition duration-200 hover:-translate-y-0.5 hover:from-brand-700 hover:to-brand-600 sm:py-3.5 sm:text-lg"
                        >
                            Entrar
                        </button>

                        <p class="border-t border-slate-200 pt-5 text-center text-sm text-slate-600 sm:pt-6 sm:text-base">
                            N&atilde;o tem cadastro?
                            <a href="./cadastro.html" class="font-semibold text-brand-600 transition hover:text-brand-800">
                                Cadastre-se
                            </a>
                        </p>
                    </form>
                </div>
            </section>
        </div>
    </main>

    <script>
        const ACCOUNTS_STORAGE_KEY = "roomEasyAccounts";
        const LEGACY_REGISTERED_STUDENTS_KEY = "roomEasyRegisteredStudents";
        const CURRENT_USER_KEY = "roomEasyCurrentUser";
        const LEGACY_CURRENT_STUDENT_KEY = "roomEasyCurrentStudent";
        const FLASH_MESSAGE_KEY = "roomEasyAuthFlashMessage";
        const DEMO_ACCOUNT_EMAILS = new Set([
            "aluno@roomeasy.com",
            "professor@roomeasy.com",
            "admin@roomeasy.com"
        ]);
        const DEMO_ACCOUNT_CPFS = new Set([
            "11111111111",
            "22222222222",
            "33333333333"
        ]);
        const loginForm = document.getElementById("loginForm");
        const loginIdentifierInput = document.getElementById("loginIdentifier");
        const togglePasswordButton = document.getElementById("togglePassword");
        const passwordInput = document.getElementById("password");
        const loginFeedback = document.getElementById("loginFeedback");
        const openEyeIcon = `
            <svg class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        `;
        const closedEyeIcon = `
            <svg class="h-7 w-7" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M3 3 21 21"></path>
                <path d="M10.6 10.7a2 2 0 0 0 2.8 2.8"></path>
                <path d="M9.4 5.1A11 11 0 0 1 12 5c6.5 0 10 7 10 7a17.2 17.2 0 0 1-4 4.9"></path>
                <path d="M6.6 6.7C3.8 8.4 2 12 2 12a16.9 16.9 0 0 0 8.5 5.6"></path>
            </svg>
        `;

        function showLoginFeedback(type, message) {
            if (!loginFeedback) {
                return;
            }

            const tone = type === "success"
                ? "border-emerald-200 bg-emerald-50 text-emerald-700"
                : "border-rose-200 bg-rose-50 text-rose-700";

            loginFeedback.className = `rounded-xl border px-4 py-3 text-sm font-semibold ${tone}`;
            loginFeedback.textContent = message;
            loginFeedback.classList.remove("hidden");
        }

        function hideLoginFeedback() {
            if (loginFeedback) {
                loginFeedback.classList.add("hidden");
            }
        }

        function normalizeCpf(value) {
            return value.replace(/\D/g, "");
        }

        function isValidEmail(value) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
        }

        function isValidIdentifier(value) {
            return isValidEmail(value) || normalizeCpf(value).length === 11;
        }

        function isDemoAccount(student) {
            const email = typeof student?.email === "string" ? student.email.trim().toLowerCase() : "";
            const cpf = typeof student?.cpf === "string" ? normalizeCpf(student.cpf) : "";
            return DEMO_ACCOUNT_EMAILS.has(email) || DEMO_ACCOUNT_CPFS.has(cpf);
        }

        function loadRegisteredStudents() {
            try {
                const storedAccounts = window.localStorage.getItem(ACCOUNTS_STORAGE_KEY);
                let parsedStudents = [];
                let shouldPersistCleanup = false;

                if (storedAccounts) {
                    const parsedAccounts = JSON.parse(storedAccounts);
                    parsedStudents = Array.isArray(parsedAccounts) ? parsedAccounts : [];
                    shouldPersistCleanup = true;
                } else {
                    const legacyStudents = window.localStorage.getItem(LEGACY_REGISTERED_STUDENTS_KEY);
                    parsedStudents = legacyStudents ? JSON.parse(legacyStudents) : [];

                    if (!Array.isArray(parsedStudents)) {
                        return [];
                    }

                    shouldPersistCleanup = parsedStudents.length > 0;
                }

                const sanitizedStudents = parsedStudents
                    .filter((student) => !isDemoAccount(student))
                    .map((student) => ({
                        ...student,
                        role: student.role || "aluno"
                    }));

                if (shouldPersistCleanup && sanitizedStudents.length !== parsedStudents.length) {
                    saveRegisteredStudents(sanitizedStudents);
                }

                return sanitizedStudents;
            } catch (error) {
                return [];
            }
        }

        function saveRegisteredStudents(students) {
            try {
                window.localStorage.setItem(ACCOUNTS_STORAGE_KEY, JSON.stringify(students));
            } catch (error) {
                return [];
            }

            return students;
        }

        function getDashboardPath(role) {
            if (role === "professor") {
                return "./painel-professor.html";
            }

            if (role === "admin") {
                return "./painel-admin.html";
            }

            return "./painel-estudante.html";
        }

        function saveCurrentStudent(student) {
            try {
                window.localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(student));
                window.localStorage.removeItem(LEGACY_CURRENT_STUDENT_KEY);
            } catch (error) {
                return;
            }
        }

        function consumeFlashMessage() {
            try {
                const message = window.sessionStorage.getItem(FLASH_MESSAGE_KEY);

                if (!message) {
                    return;
                }

                window.sessionStorage.removeItem(FLASH_MESSAGE_KEY);
                showLoginFeedback("success", message);
            } catch (error) {
                return;
            }
        }

        if (togglePasswordButton && passwordInput) {
            togglePasswordButton.addEventListener("click", function () {
                const isHidden = passwordInput.type === "password";
                passwordInput.type = isHidden ? "text" : "password";
                togglePasswordButton.innerHTML = isHidden ? closedEyeIcon : openEyeIcon;
                togglePasswordButton.setAttribute("aria-label", isHidden ? "Ocultar senha" : "Mostrar senha");
            });
        }

        if (loginForm && loginIdentifierInput && passwordInput) {
            loginForm.addEventListener("submit", function (event) {
                event.preventDefault();

                const identifier = loginIdentifierInput.value.trim();
                const password = passwordInput.value.trim();
                const registeredStudents = loadRegisteredStudents();

                if (!identifier || !password) {
                    showLoginFeedback("error", "Preencha seu e-mail ou CPF e tambem a senha.");
                    return;
                }

                if (!isValidIdentifier(identifier)) {
                    showLoginFeedback("error", "Digite um e-mail valido ou um CPF com 11 digitos.");
                    return;
                }

                if (password.length < 6) {
                    showLoginFeedback("error", "A senha precisa ter pelo menos 6 caracteres.");
                    return;
                }

                if (!registeredStudents.length) {
                    showLoginFeedback("error", "Nenhuma conta cadastrada foi encontrada neste navegador. Use Cadastre-se para criar o primeiro acesso.");
                    return;
                }

                const normalizedIdentifier = identifier.toLowerCase();
                const normalizedCpf = normalizeCpf(identifier);
                const matchedStudent = registeredStudents.find((student) => (
                    student.email === normalizedIdentifier ||
                    student.cpf === normalizedCpf
                ));

                if (!matchedStudent || matchedStudent.password !== password) {
                    showLoginFeedback("error", "Nao encontramos uma conta com esses dados. Confira e tente novamente.");
                    return;
                }

                saveCurrentStudent({
                    name: matchedStudent.name,
                    email: matchedStudent.email,
                    cpf: matchedStudent.cpf,
                    role: matchedStudent.role || "aluno"
                });

                window.location.href = getDashboardPath(matchedStudent.role || "aluno");
            });
        }

        [loginIdentifierInput, passwordInput].forEach((field) => {
            if (field) {
                field.addEventListener("input", hideLoginFeedback);
            }
        });

        consumeFlashMessage();
    </script>
</body>
</html>
